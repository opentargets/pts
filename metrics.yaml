---
# metrics.yaml — standalone otter config for metrics collection
# Points at the real output data directory; run with:
#   otter run -c metrics.yaml
work_path: /home/misio-pysio/data/opentargets
log_level: INFO
pool_size: 4

scratchpad:
  release: '26.06-pub'  # override with the actual release name before running
  run: '1'              # override with the actual run identifier before running

steps:

  disease_metrics:
    - name: collect_metrics disease
      source: output/disease
      destination: metrics/disease.jsonl
      metrics:
        - type: count
          name: total_count
        - type: grouped_count_explode
          name: count_by_therapeutic_area
          group_by: [therapeuticAreas]

  target_metrics:
    - name: collect_metrics target
      source: output/target
      destination: metrics/target.jsonl
      metrics:
        - type: count
          name: total_count
        - type: grouped_count
          name: count_by_biotype
          group_by: [biotype]

  drug_molecule_metrics:
    - name: collect_metrics drug_molecule
      source: output/drug_molecule
      destination: metrics/drug_molecule.jsonl
      metrics:
        - type: count
          name: total_count
        - type: grouped_count
          name: count_by_drug_type
          group_by: [drugType]
        - type: grouped_count
          name: count_by_max_clinical_stage
          group_by: [maximumClinicalStage]

  study_metrics:
    - name: collect_metrics study
      source: output/study
      destination: metrics/study.jsonl
      metrics:
        - type: count
          name: total_count
        - type: distinct_count
          name: distinct_studies
          columns: [studyId]
        - type: grouped_count
          name: count_by_study_type
          group_by: [studyType]
        - type: grouped_count
          name: count_by_project
          group_by: [projectId]

  credible_set_metrics:
    - name: collect_metrics credible_set
      source: output/credible_set
      destination: metrics/credible_set.jsonl
      metrics:
        - type: count
          name: total_count
        - type: distinct_count
          name: distinct_studies
          columns: [studyId]
        - type: grouped_count
          name: count_by_study_type
          group_by: [studyType]
        - type: grouped_count
          name: count_by_finemapping_method
          group_by: [finemappingMethod]

  variant_metrics:
    - name: collect_metrics variant
      source: output/variant
      destination: metrics/variant.jsonl
      metrics:
        - type: count
          name: total_count
        - type: grouped_count
          name: count_by_most_severe_consequence
          group_by: [mostSevereConsequenceId]

  l2g_prediction_metrics:
    - name: collect_metrics l2g_prediction
      source: output/l2g_prediction
      destination: metrics/l2g_prediction.jsonl
      metrics:
        - type: count
          name: total_count
        - type: distinct_count
          name: distinct_genes
          columns: [geneId]
        - type: custom
          class: pts.metrics.custom.l2g.L2GSignificantGeneMetric
          name: significant_gene_count
          threshold: 0.5

  colocalisation_metrics:
    - name: collect_metrics colocalisation
      source: output/colocalisation
      destination: metrics/colocalisation.jsonl
      metrics:
        - type: count
          name: total_count
        - type: grouped_count
          name: count_by_right_study_type
          group_by: [rightStudyType]
        - type: grouped_count
          name: count_by_method
          group_by: [colocalisationMethod]
  association_by_datasource_direct_metrics:
    - name: collect_metrics association_by_datasource_direct
      source: output/association_by_datasource_direct
      destination: metrics/association_by_datasource_direct.jsonl
      metrics:
        - type: count
          name: total_count
  association_by_datasource_indirect_metrics:
    - name: collect_metrics association_by_datasource_indirect
      source: output/association_by_datasource_indirect
      destination: metrics/association_by_datasource_indirect.jsonl
      metrics:
        - type: count
          name: total_count
  association_by_datatype_direct_metrics:
    - name: collect_metrics association_by_datatype_direct
      source: output/association_by_datatype_direct
      destination: metrics/association_by_datatype_direct.jsonl
      metrics:
        - type: count
          name: total_count
        - type: grouped_sum
          name: evidence_count_by_datatype
          column: evidenceCount
          group_by: [aggregationValue]

  association_by_datatype_indirect_metrics:
    - name: collect_metrics association_by_datatype_indirect
      source: output/association_by_datatype_indirect
      destination: metrics/association_by_datatype_indirect.jsonl
      metrics:
        - type: count
          name: total_count
        - type: grouped_sum
          name: evidence_count_by_datatype
          column: evidenceCount
          group_by: [aggregationValue]

  evidence_cancer_biomarkers_metrics:
    - name: collect_metrics evidence_cancer_biomarkers
      source: output/evidence_cancer_biomarkers
      destination: metrics/evidence_cancer_biomarkers.jsonl
